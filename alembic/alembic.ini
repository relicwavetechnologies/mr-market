[alembic]
# Path to migration scripts
script_location = .

# Template used for generating migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone to use when rendering the date within migration file names
timezone = Asia/Kolkata

# SQLAlchemy URL — overridden at runtime by env.py from DATABASE_URL env var
sqlalchemy.url = postgresql://mrmarket:mrmarket@localhost:5432/mrmarket

# Truncate long revision identifiers
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
