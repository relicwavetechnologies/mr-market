# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --reload --factory
    volumes:
      - ../apps/api:/app
      - ../packages/shared:/packages/shared
    environment:
      - DEBUG=true

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    # In dev, run the Vite dev server directly instead of nginx
    command: pnpm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web:/app
      - /app/node_modules

  workers:
    command: celery -A app.celery_app:celery worker --loglevel=debug -Q default,nightly,news,prices
    volumes:
      - ../workers:/app
      - ../packages/shared:/packages/shared
    environment:
      - DEBUG=true
