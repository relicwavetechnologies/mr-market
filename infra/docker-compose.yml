services:
  # ── Application Services ──────────────────────────────────────────────

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - mrmarket

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - mrmarket

  workers:
    build:
      context: ../workers
      dockerfile: Dockerfile
    command: celery -A app.celery_app:celery worker --loglevel=info -Q default,nightly,news,prices
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mrmarket

  beat:
    build:
      context: ../workers
      dockerfile: Dockerfile
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mrmarket

  # ── Data Stores ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mrmarket
      POSTGRES_PASSWORD: mrmarket
      POSTGRES_DB: mrmarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrmarket"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mrmarket

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mrmarket

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mrmarket

  # ── Reverse Proxy ──────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - mrmarket

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  mrmarket:
    driver: bridge
