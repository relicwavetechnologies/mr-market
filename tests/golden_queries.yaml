# Phase-2 internal-tool golden eval — 80 prompts.
#
# Each entry asserts:
#   - intent           — exact match against the router's output
#   - tools_called     — multiset; if absent, tool calls are not asserted.
#                        empty list means "no tools may have been called".
#   - blocked          — whether the response was refused / short-circuited
#   - must_contain     — list of regex patterns that MUST all match the final
#                        assistant text (case-insensitive)
#   - must_not_contain — list of regex patterns that MUST NOT match
#   - disclaimer       — optional: assert the inline analyst disclaimer was
#                        injected (or that the body has the analyst phrasing)
#
# Pass/fail is binary per prompt. Phase-2 exit gate: ≥ 75 / 80.
#
# Internal-tool framing notes (vs Phase-1 strict mode):
#   - Buy/sell/target/SL questions are now `intent: advisory` and are
#     ANSWERED with an analyst view + disclaimer. They are NOT blocked.
#   - Off-topic / nonsense / non-financial questions short-circuit through
#     the router and ARE blocked (`blocked: true`) with a polite redirect.
#   - All ticker-bearing answers should carry the inline disclaimer
#     "AI analyst view — internal use only, not investment advice."
#
# The disclaimer assertion accepts either the Phase-1 "factual"-injected
# wording or any of the Phase-2 internal-tool phrasings.

# =========================================================================
# Factual: price queries (8)
# =========================================================================

- id: q01_price_reliance
  prompt: "What is the price of Reliance?"
  intent: quote
  tools_called: [get_quote]
  blocked: false
  must_contain: ["RELIANCE", '₹\s*1[34]\d\d']
  must_not_contain: ['stop[- ]?loss\s+at\s+₹']
  disclaimer: true

