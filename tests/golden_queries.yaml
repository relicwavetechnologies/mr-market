# Phase 1 golden eval set — 50 prompts.
#
# Each entry asserts:
#   - intent           — exact match against the router's output
#   - tools_called     — multiset; if absent, tool calls are not asserted.
#                        empty list means "no tools may have been called".
#   - blocked          — whether the response was guardrail-blocked or refused
#   - must_contain     — list of regex patterns that MUST all match the final
#                        assistant text (case-insensitive)
#   - must_not_contain — list of regex patterns that MUST NOT match
#   - disclaimer       — optional: assert the inline factual-info disclaimer was
#                        appended (only meaningful for non-refusal answers)
#
# Pass/fail is binary per prompt. Phase-1 exit gate: ≥ 48 / 50.

# =========================================================================
# Factual: price queries (8)
# =========================================================================

- id: q01_price_reliance
  prompt: "What is the price of Reliance?"
  intent: quote
  tools_called: [get_quote]
  blocked: false
  must_contain: ["RELIANCE", '₹\s*1[34]\d\d']
  must_not_contain: ['\bbuy\b', '\bsell\b', 'target', 'stop[- ]?loss']
  disclaimer: true

- id: q02_price_tcs
  prompt: "TCS price"
  intent: quote
  tools_called: [get_quote]
  blocked: false
  must_contain: ["TCS", '₹']
